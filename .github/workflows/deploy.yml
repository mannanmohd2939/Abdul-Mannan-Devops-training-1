name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ec2-user
  SECRET_NAME: ${{ secrets.SECRET_NAME }}
  APP_DIR: /opt/deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Retrieve SSH key from Secrets Manager
        run: |
          SSH_KEY=$(aws secretsmanager get-secret-value \
            --secret-id ${{ secrets.SECRET_NAME }} \
            --query SecretString \
            --output text)
          echo "$SSH_KEY" > ssh_key.pem
          chmod 400 ssh_key.pem

      - name: Deploy application files
        run: |
          # Create deployment directory
          ssh -o StrictHostKeyChecking=no -i ssh_key.pem $EC2_USER@$EC2_HOST "mkdir -p $APP_DIR"
          
          # Copy application files to EC2
          scp -o StrictHostKeyChecking=no -i ssh_key.pem -r ./* $EC2_USER@$EC2_HOST:$APP_DIR/
          
          # Note: Exclude terraform and .github directories from deployment
          ssh -o StrictHostKeyChecking=no -i ssh_key.pem $EC2_USER@$EC2_HOST "rm -rf $APP_DIR/aws-infra $APP_DIR/.github"

      - name: Run deployment commands
        run: |
          # Restart application based on app type
          ssh -o StrictHostKeyChecking=no -i ssh_key.pem $EC2_USER@$EC2_HOST << 'EOF'
            # Restart based on app type (adjust as needed for your application)
            
            # If using systemd service
            sudo systemctl restart myapp || true
            
            # If using nginx
            sudo systemctl restart nginx || true
            
            # If using httpd
            sudo systemctl restart httpd || true
            
            echo "Deployment completed!"
          EOF

      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no -i ssh_key.pem $EC2_USER@$EC2_HOST "curl -s http://localhost:80 || echo 'Checking if app is running on port 80'"