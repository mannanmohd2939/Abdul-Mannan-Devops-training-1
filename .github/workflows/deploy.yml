name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ec2-user
  SECRET_NAME: ${{ secrets.SECRET_NAME }}
  APP_DIR: /home/ec2-user/deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > ssh_key.pem
          chmod 400 ssh_key.pem

      - name: Deploy application files
        run: |
          ssh -o StrictHostKeyChecking=no -i ssh_key.pem $EC2_USER@$EC2_HOST "mkdir -p $APP_DIR"

          rsync -avz -e "ssh -i ssh_key.pem -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'ssh_key.pem' \
            ./ $EC2_USER@$EC2_HOST:$APP_DIR/

          ssh -o StrictHostKeyChecking=no -i ssh_key.pem $EC2_USER@$EC2_HOST \ "rm -rf $APP_DIR/.github"

      - name: Run deployment commands
        run: |
          ssh -o StrictHostKeyChecking=no -i ssh_key.pem $EC2_USER@$EC2_HOST << 'EOF'
            sudo systemctl stop nginx || true
            sudo systemctl stop httpd || true
            sudo systemctl restart myapp
            echo "Deployment completed!"
          EOF

      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no -i ssh_key.pem $EC2_USER@$EC2_HOST "curl -s http://localhost:80 || echo 'Checking if app is running on port 80'"