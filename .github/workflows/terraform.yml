name: Terraform CI/CD

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.7.5

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'destroy'
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::679336465006:role/github-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init (no backend)
        run: terraform init -backend=false
        working-directory: ./aws-infra

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./aws-infra

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::679336465006:role/github-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ./aws-infra

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -detailed-exitcode
        working-directory: ./aws-infra
        continue-on-error: true

      - name: Save Plan Output
        if: always()
        run: |
          if [ -f tfplan ]; then
            terraform show tfplan > plan.txt
            # Escape for GitHub output
            PLAN_OUTPUT=$(cat plan.txt | head -100)
            PLAN_OUTPUT="${PLAN_OUTPUT//'%'/'%25'}"
            PLAN_OUTPUT="${PLAN_OUTPUT//$'\n'/'%0A'}"
            PLAN_OUTPUT="${PLAN_OUTPUT//$'\r'/'%0D'}"
            echo "plan_summary=$PLAN_OUTPUT" >> $GITHUB_OUTPUT
          fi
        working-directory: ./aws-infra

      - name: Post Plan as PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const planOutput = process.env.PLAN_OUTPUT || 'No plan output available';
            const body = `### Terraform Plan 📋\n\n\`\`\`\n${planOutput}\n\`\`\`\n\n**Plan Status:** ${{ steps.plan.outcome }}`;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existingComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('Terraform Plan'));
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ./aws-infra/tfplan
          retention-days: 5

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::679336465006:role/github-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ./aws-infra

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ./aws-infra

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ./aws-infra

  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    permissions:
      id-token: write
      contents: read
    environment:
      name: destroy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::679336465006:role/github-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ./aws-infra

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: ./aws-infra